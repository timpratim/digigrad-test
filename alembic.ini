# Alembic config for gradphone's Postgres deployments.
#
# Local dev uses SQLite and bootstraps the schema via metadata.create_all
# (db.init_db) — Alembic is NOT needed there. On Postgres, the deployment
# init-container runs `alembic upgrade head` before the app starts (matching
# gradium-serve's `api` service). The DB URL is taken from the environment
# (db.sync_url) in migrations/env.py, not hardcoded here.

[alembic]
script_location = migrations
prepend_sys_path = src

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
