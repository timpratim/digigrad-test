# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Render Blueprint — one gradphone clone (bridge + bot) as a single always-on
# Web Service. One deployment per person.
#
# Workshop: after forking, run the "Setup attendee Blueprint names" GitHub Action
# (or `npm run setup`) so resource names are prefixed with your GitHub username.
#
# Deploy: Render Dashboard → New → Blueprint → connect your fork. Render creates
# a Project and prompts for the `sync: false` secrets below. After deploy, point
# your Twilio number's Voice webhook at https://<your-service>.onrender.com/twilio/voice.

previews:
  generation: off

projects:
  - name: timpratim-digigrad
    environments:
      - name: production
        services:
          - type: web
            name: timpratim-gradphone
            runtime: docker
            dockerfilePath: ./Dockerfile
            plan: starter # always-on. Do NOT use free — it sleeps and drops calls/WebSockets.
            region: frankfurt # closest to EU numbers/users; use oregon/virginia for US.
            numInstances: 1 # single stateful instance — in-memory call state; never scale >1.
            healthCheckPath: /healthz
            disk:
              name: timpratim-gradphone-data
              mountPath: /data # SQLite DB + call recordings live here (persist across deploys).
              sizeGB: 1
            envVars:
              # Storage lands under $HOME, which we point at the mounted disk.
              - key: HOME
                value: /data
              # Non-secret config (safe to commit).
              - key: ENABLE_INBOUND
                value: "true"
              - key: MAX_CALL_DURATION_SECONDS
                value: "180"
              - key: GRADBOT_MAX_CONCURRENT
                value: "3"
              - key: BARGE_IN_GUARD_S
                value: "1.0"
              # Disable Twilio Answering Machine Detection — for "call me" / inbound a
              # human answers, and AMD often misfires and diverts to the voicemail
              # branch. (Re-enable only if you cold-call businesses to detect voicemail.)
              - key: TWILIO_MACHINE_DETECTION
                value: "Disable"
              # Secrets / per-person values — set these in the Render dashboard.
              - key: TELEGRAM_BOT_TOKEN
                sync: false
              # Telegram authorization: comma-separated user IDs allowed to use the bot.
              # With neither this nor WORKSHOP_CODE set, the bot denies everyone.
              - key: ALLOWED_TELEGRAM_IDS
                sync: false
              - key: WORKSHOP_CODE
                sync: false
              - key: GRADIUM_API_KEY
                sync: false
              - key: GRADIUM_BASE_URL
                sync: false
              # Required: default agent voice UID (a voice in your Gradium account).
              # The app refuses to start without it.
              - key: AGENT_VOICE_ID
                sync: false
              - key: LLM_BASE_URL
                sync: false
              - key: LLM_MODEL
                sync: false
              # Alternative to LLM_BASE_URL/LLM_MODEL: use OpenAI's API directly.
              - key: OPENAI_API_KEY
                sync: false
              - key: TWILIO_ACCOUNT_SID
                sync: false
              - key: TWILIO_AUTH_TOKEN
                sync: false
              - key: TWILIO_PHONE_NUMBER
                sync: false
              - key: BRIDGE_API_KEY
                sync: false
              - key: ALLOW_ARBITRARY_OUTBOUND
                sync: false
              # Optional features — leave unset to disable.
              - key: LINKUP_API_KEY
                sync: false
              # Business lookup for assistant-mode calls (find_business tool, places.py).
              - key: GOOGLE_PLACES_API_KEY
                sync: false
              - key: GMAIL_ADDRESS
                sync: false
              - key: GMAIL_APP_PASSWORD
                sync: false
